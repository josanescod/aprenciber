id: "ftp-credentials-01"
name: "FTP Credentials"
description: "Accedeix a un servidor FTP per obtenir la flag."
difficulty: "easy"
tags:
  - "ftp"
  - "misconfiguration"
active: true

networks:
  external:
    driver: "bridge"

containers:
  attacker:
    image: "aprenciber-ftp-attacker:demo"
    build_context: "attacker"
    dockerfile: "Dockerfile"
    role: "attacker"
    networks:
      - "external"

  target:
    image: "aprenciber-ftp-target:demo"
    build_context: "target"
    dockerfile: "Dockerfile"
    role: "target"
    networks:
      - "external"
    ports:
      - 21

flag:
  path: "/home/magnus/flag.txt"
  
hints:
  - "Les eines d'enumeració (nmap) i força bruta (hydra) poden ser útils en aquest escenari"
  - "Alguns serveis permeten accedir amb usuaris per defecte, com anonymous"